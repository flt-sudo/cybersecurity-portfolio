<!--
  Wazuh Agent Configuration File (ossec.conf)
  Endpoint: Kali Linux 2024.1 (10.0.0.20)
  Agent ID: 001 (kali-endpoint)
  Manager: 10.0.0.10

  This configuration defines log collection sources, file integrity
  monitoring targets, rootcheck settings, and active response for
  a monitored Linux endpoint in the SIEM home lab.
-->

<ossec_config>

  <!-- ============================================== -->
  <!-- Agent connection to the Wazuh Manager           -->
  <!-- ============================================== -->
  <client>
    <server>
      <address>10.0.0.10</address>
      <port>1514</port>
      <protocol>tcp</protocol>
    </server>
    <config-profile>debian, debian10</config-profile>
    <notify_time>10</notify_time>
    <time-reconnect>60</time-reconnect>
    <auto_restart>yes</auto_restart>
    <crypto_method>aes</crypto_method>
    <enrollment>
      <enabled>yes</enabled>
      <manager_address>10.0.0.10</manager_address>
      <port>1515</port>
    </enrollment>
  </client>

  <!-- ============================================== -->
  <!-- Client buffer settings                          -->
  <!-- Manages event queue before forwarding           -->
  <!-- ============================================== -->
  <client_buffer>
    <disabled>no</disabled>
    <queue_size>5000</queue_size>
    <events_per_second>500</events_per_second>
  </client_buffer>

  <!-- ============================================== -->
  <!-- File Integrity Monitoring (syscheck)            -->
  <!--                                                 -->
  <!-- Monitors critical directories for unauthorized  -->
  <!-- file changes, new files, and deletions.         -->
  <!-- Real-time monitoring is enabled for /etc and    -->
  <!-- /var/www to detect configuration tampering and  -->
  <!-- web shell deployment.                           -->
  <!-- ============================================== -->
  <syscheck>
    <disabled>no</disabled>
    <frequency>300</frequency>
    <scan_on_start>yes</scan_on_start>
    <alert_new_files>yes</alert_new_files>

    <!-- System configuration files - real-time monitoring -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc</directories>

    <!-- Web server document root - real-time monitoring -->
    <!-- Detects web shell uploads, defacement, config changes -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/var/www</directories>

    <!-- Binary directories - detect trojanized binaries -->
    <directories check_all="yes">/usr/bin</directories>
    <directories check_all="yes">/usr/sbin</directories>
    <directories check_all="yes">/bin</directories>
    <directories check_all="yes">/sbin</directories>

    <!-- Cron directories - detect persistence mechanisms -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc/cron.d</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/etc/cron.daily</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/var/spool/cron</directories>

    <!-- SSH configuration - detect authorized_keys tampering -->
    <directories realtime="yes" check_all="yes" report_changes="yes">/root/.ssh</directories>
    <directories realtime="yes" check_all="yes" report_changes="yes">/home</directories>

    <!-- Ignore list: files that change frequently and generate noise -->
    <ignore>/etc/mtab</ignore>
    <ignore>/etc/hosts.deny</ignore>
    <ignore>/etc/adjtime</ignore>
    <ignore>/etc/prelink.cache</ignore>
    <ignore>/etc/resolv.conf</ignore>
    <ignore type="sregex">.log$|.swp$|.tmp$</ignore>

    <!-- FIM file size limit (skip files larger than 50MB) -->
    <file_limit>
      <enabled>yes</enabled>
      <entries>100000</entries>
    </file_limit>

    <!-- Registry monitoring not applicable to Linux (Windows only) -->

    <!-- Skip NFS and other network filesystems -->
    <skip_nfs>yes</skip_nfs>
    <skip_dev>yes</skip_dev>
    <skip_proc>yes</skip_proc>
    <skip_sys>yes</skip_sys>
  </syscheck>

  <!-- ============================================== -->
  <!-- Rootcheck - Rootkit detection                   -->
  <!-- ============================================== -->
  <rootcheck>
    <disabled>no</disabled>
    <check_files>yes</check_files>
    <check_trojans>yes</check_trojans>
    <check_dev>yes</check_dev>
    <check_sys>yes</check_sys>
    <check_pids>yes</check_pids>
    <check_ports>yes</check_ports>
    <check_if>yes</check_if>
    <frequency>43200</frequency>
    <rootkit_files>etc/shared/rootkit_files.txt</rootkit_files>
    <rootkit_trojans>etc/shared/rootkit_trojans.txt</rootkit_trojans>
  </rootcheck>

  <!-- ============================================== -->
  <!-- Log Collection (localfile)                      -->
  <!--                                                 -->
  <!-- Defines which log files the agent reads and     -->
  <!-- forwards to the Wazuh Manager for analysis.     -->
  <!-- ============================================== -->

  <!-- Authentication logs - SSH logins, sudo, PAM events -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/auth.log</location>
  </localfile>

  <!-- System syslog - general system events -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/syslog</location>
  </localfile>

  <!-- Kernel messages -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/kern.log</location>
  </localfile>

  <!-- DPKG log - package installation/removal events -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/dpkg.log</location>
  </localfile>

  <!-- Apache access log - HTTP request logging -->
  <!-- Used by custom web attack detection rules -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/access.log</location>
  </localfile>

  <!-- Apache error log - server errors and misconfigurations -->
  <localfile>
    <log_format>apache</log_format>
    <location>/var/log/apache2/error.log</location>
  </localfile>

  <!-- Audit log - detailed syscall-level logging from auditd -->
  <localfile>
    <log_format>audit</log_format>
    <location>/var/log/audit/audit.log</location>
  </localfile>

  <!-- Cron log - scheduled task execution -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/log/cron.log</location>
  </localfile>

  <!-- Wazuh agent internal logs (for meta-monitoring) -->
  <localfile>
    <log_format>syslog</log_format>
    <location>/var/ossec/logs/active-responses.log</location>
  </localfile>

  <!-- Collect output of commands for process monitoring -->
  <!-- Lists all running processes every 60 seconds -->
  <localfile>
    <log_format>full_command</log_format>
    <command>ps aux --sort=-%mem | head -20</command>
    <alias>top-processes</alias>
    <frequency>60</frequency>
  </localfile>

  <!-- Monitor listening ports for unauthorized services -->
  <localfile>
    <log_format>full_command</log_format>
    <command>ss -tulnp</command>
    <alias>listening-ports</alias>
    <frequency>120</frequency>
  </localfile>

  <!-- Monitor active network connections -->
  <localfile>
    <log_format>full_command</log_format>
    <command>ss -tnp state established</command>
    <alias>established-connections</alias>
    <frequency>120</frequency>
  </localfile>

  <!-- Monitor users currently logged in -->
  <localfile>
    <log_format>full_command</log_format>
    <command>who</command>
    <alias>logged-in-users</alias>
    <frequency>60</frequency>
  </localfile>

  <!-- ============================================== -->
  <!-- Active Response Configuration                   -->
  <!--                                                 -->
  <!-- The agent side only needs to enable the         -->
  <!-- active-response block. The actual triggers are  -->
  <!-- defined on the Wazuh Manager (server-side).     -->
  <!-- ============================================== -->
  <active-response>
    <disabled>no</disabled>
    <ca_store>etc/wpk_root.pem</ca_store>
    <ca_verification>yes</ca_verification>
  </active-response>

  <!-- ============================================== -->
  <!-- Log rotation and internal logging               -->
  <!-- ============================================== -->
  <logging>
    <log_format>plain</log_format>
  </logging>

  <!-- ============================================== -->
  <!-- Vulnerability detection agent module            -->
  <!-- Sends package inventory to the manager for      -->
  <!-- CVE correlation.                                -->
  <!-- ============================================== -->
  <wodle name="syscollector">
    <disabled>no</disabled>
    <interval>1h</interval>
    <scan_on_start>yes</scan_on_start>
    <packages>yes</packages>
    <os>yes</os>
    <hardware>yes</hardware>
    <network>yes</network>
    <ports all="no">yes</ports>
    <processes>yes</processes>
  </wodle>

  <!-- ============================================== -->
  <!-- Security Configuration Assessment (SCA)         -->
  <!-- Checks system hardening against CIS benchmarks  -->
  <!-- ============================================== -->
  <wodle name="sca">
    <enabled>yes</enabled>
    <scan_on_start>yes</scan_on_start>
    <interval>12h</interval>
    <skip_nfs>yes</skip_nfs>
  </wodle>

</ossec_config>
